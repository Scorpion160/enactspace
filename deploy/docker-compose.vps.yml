name: enactspace

services:
  postgres:
    image: postgres:16
    container_name: enactspace_postgres
    restart: unless-stopped
    env_file:
      - /etc/enactspace/enactspace.env
    volumes:
      - enactspace_postgres_data:/var/lib/postgresql/data
    networks:
      - enactspace_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: enactspace_backend
    restart: unless-stopped
    env_file:
      - /etc/enactspace/enactspace.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/lib/enactspace/uploads:/app/uploads
      - /var/lib/enactspace/import:/app/private_import:ro
    ports:
      - "127.0.0.1:18002:8000"
    networks:
      - enactspace_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 20s
      timeout: 6s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  web:
    image: nginx:1.27-alpine
    container_name: enactspace_web
    restart: unless-stopped
    volumes:
      - /opt/enactspace/web:/usr/share/nginx/html:ro
      - ./nginx-enactspace-web.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:18080:80"
    networks:
      - enactspace_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  enactspace_network:
    name: enactspace_network

volumes:
  enactspace_postgres_data:
    name: enactspace_postgres_data
